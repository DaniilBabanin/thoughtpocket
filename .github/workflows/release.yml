name: Release

on:
  push:
    tags:
      - 'v[0-9]*.*.*'   # v0.1.0, v1.2.3, … ; a -pre.N suffix flips to pre-release

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK + NDK + CMake
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" > /dev/null 2>&1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --stacktrace

      # Signed automatically by the committed app/release.keystore (see
      # app/build.gradle.kts signingConfigs — public keystore, no secrets).
      - name: Build release APK + AAB
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      # Assert the signed APK's certificate matches the value pinned in
      # tools/release/expected-signing-cert.sha256. Any keystore swap
      # (accidental or otherwise) fails the release here before publish.
      - name: Verify APK signing-cert fingerprint
        run: |
          set -euo pipefail
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          APK="app/build/outputs/apk/release/app-release.apk"
          EXPECTED="$(tr -d '[:space:]' < tools/release/expected-signing-cert.sha256)"
          if [ -z "$EXPECTED" ]; then
            echo "::error::tools/release/expected-signing-cert.sha256 is empty"; exit 1
          fi
          ACTUAL="$("$BUILD_TOOLS/apksigner" verify --print-certs "$APK" \
            | awk -F': ' '/Signer #1 certificate SHA-256 digest/ {print tolower($2); exit}')"
          echo "expected: $EXPECTED"
          echo "actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::APK signing-cert SHA-256 mismatch - refusing to publish"; exit 1
          fi
          echo "signing-cert fingerprint OK"

      # dex SHA-256 witnesses let an external rebuilder verify the compiled
      # bytecode matches the published APK without trusting the signature.
      - name: Emit dex SHA-256 witnesses
        id: dex_witness
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          mkdir -p /tmp/apk-witness
          (cd /tmp/apk-witness && unzip -qq -o "$GITHUB_WORKSPACE/$APK" 'classes*.dex')
          DEX_HASHES=$(cd /tmp/apk-witness && sha256sum classes*.dex | sort)
          {
            echo "dex_witness<<EOF_DEX"
            echo "$DEX_HASHES"
            echo "EOF_DEX"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ThoughtPocket ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          append_body: true
          body: |
            ### Build integrity

            Signing-cert SHA-256 (pinned in `tools/release/expected-signing-cert.sha256`):

            ```
            c17f63be4248ab9ee495577dd56bdea2c620f05314ba6ecfda2c79a6645abd41
            ```

            APK `classes*.dex` SHA-256 witnesses for an independent rebuild check:

            ```
            ${{ steps.dex_witness.outputs.dex_witness }}
            ```

            > The keystore is public, so the signature proves *this CI build's*
            > provenance, not anti-tamper. Trust the GitHub Releases page itself
            > and compare these hashes if you sideload from elsewhere.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
