org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
# Parallel breaks since the Chaquopy plugin landed ("does not hold state lock"
# in compileDebugKotlin, 2026-07-11) and buys nothing in a single-module build.
org.gradle.parallel=false
org.gradle.caching=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# Set to true to build whisper.cpp with Vulkan GPU backend (Pixel 9 / Mali-G715).
# Vulkan support in whisper.cpp is solid but increases APK size and build time.
# Default false = CPU build (still 5-10x realtime on Tensor G4 with base model).
whispershare.vulkan=false
